<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />

    <!-- Primary SEO -->
    <title>Ismail Markhi | Web Developer in Morocco | React, Laravel, Tailwind</title>

    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta property="og:image:alt" content="Ismail Markhi portfolio preview" />

      name="twitter:description"
      content="Portfolio of Ismail Markhi, web developer specializing in React, Laravel, Tailwind CSS, and scalable web applications."

          "https://www.linkedin.com/in/ismail-markhi-a67033317/",

  <body>

      <main id="main-content">

          Portfolio of Ismail Markhi, web developer in Morocco specializing in
