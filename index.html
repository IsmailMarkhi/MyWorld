<!doctype html>
<html lang="en">
  <head>
    <!-- Charset & viewport -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Ismail Markhi | Web Developer in Morocco (React & Laravel)</title>

    <meta
      name="description"
      content="Ismail Markhi is a web developer in Morocco specializing in React, Laravel, Tailwind CSS, and scalable full-stack applications. Explore projects and portfolio."
    />

    <meta name="author" content="Ismail Markhi" />

    <!-- ⚠️ Remove keywords (Google ignores it) -->

    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <meta name="theme-color" content="#0f172a" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.ismailmarkhi.dev/" />

    <!-- ✅ Favicons (clean, no duplication) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ismail Markhi Portfolio" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://www.ismailmarkhi.dev/" />
    <meta property="og:title" content="Ismail Markhi | Web Developer" />

    <meta
      property="og:description"
      content="Web Developer in Morocco building modern React and Laravel applications with clean UI and scalable architecture."
    />

    <meta property="og:image" content="https://www.ismailmarkhi.dev/image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ismail Markhi portfolio preview" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ismail Markhi | Web Developer" />
    <meta
      name="twitter:description"
      content="Portfolio of Ismail Markhi, Web Developer specializing in React and Laravel."
    />
    <meta name="twitter:image" content="https://www.ismailmarkhi.dev/image.png" />

    <!-- Performance -->
    <link rel="preconnect" href="https://www.ismailmarkhi.dev" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Ismail Markhi",
        "url": "https://www.ismailmarkhi.dev/",
        "image": "https://www.ismailmarkhi.dev/image.png",
        "jobTitle": "Web Developer",
        "description": "Web developer in Morocco specializing in React, Laravel, and scalable web applications.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "MA"
        },
        "sameAs": [
          "https://www.linkedin.com/in/ismail-markhi-a67033317/",
          "https://github.com/IsmailMarkhi"
        ]
      }
    </script>
  </head>

  <body>
    <!-- Accessibility -->
    <a
      href="#main-content"
      style="position:absolute;left:-9999px;"
      onfocus="this.style.left='16px';this.style.top='16px';this.style.padding='10px';this.style.background='#fff';this.style.zIndex='9999';"
      onblur="this.style.left='-9999px';"
    >
      Skip to main content
    </a>

    <!-- No JS fallback -->
    <noscript>
      <header>
        <h1>Ismail Markhi - Web Developer</h1>
      </header>

      <main id="main-content">
        <p>
          Portfolio of Ismail Markhi, Web Developer specializing in React,
          Laravel, and modern web applications.
        </p>
      </main>
    </noscript>

    <!-- React root -->
    <div id="root"></div>

    <!-- App -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
